name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Verify imports
        run: |
          python -c "from src.data import load_features, make_engineered_features"
          python -c "from src.evaluation import cross_validate_custom, make_skf"
          python -c "from src.models import AttentionClassifier, LogisticRegressionOvR, LogisticRegressionSoftmax"
          python -c "from src.models import DecisionTreeClassifierCustom"
          python -c "from src.models import KMeansCustom, DBSCANCustom, GaussianMixtureModelCustom, AgglomerativeCustom"
          python -c "from src.models import BaggingClassifierCustom, BaggingRegressorCustom, AdaBoostClassifierCustom"
          python -c "from src.models import ActivationFunctions, MLPCustom"
          python scripts/verify_model_imports.py
